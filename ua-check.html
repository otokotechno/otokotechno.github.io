<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UA Check</title>
<style>
  body { background:#111; color:#fff; font-family:sans-serif; padding:2rem; word-break:break-all; }
  #ua { background:#222; padding:1rem; border-radius:4px; font-size:0.8rem; line-height:1.8; margin-top:1rem; }
</style>
</head>
<body>
<h2>User Agent チェック</h2>
<div id="ua"></div>
<script>
document.getElementById('ua').textContent = navigator.userAgent;
</script>
</body>
</html>
